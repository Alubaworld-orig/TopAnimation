plugins {
    id 'java'
}

group = 'com.topanimation'
version = '1.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_16
    targetCompatibility = JavaVersion.VERSION_16
}

repositories {
    mavenCentral()
}

jar {
    manifest {
        attributes(
            'Main-Class': 'com.topanimation.core.AnimationManager',
            'Implementation-Title': 'TopAnimation-1.19',
            'Implementation-Version': project.version
        )
    }
}
